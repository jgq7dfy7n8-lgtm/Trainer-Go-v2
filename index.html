<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Trainer Go</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#060608;}
body{background:#060608;color:#f0f0ff;font-family:Rajdhani,sans-serif;min-height:100vh;}
/* NO position:fixed on pages - use display none/block only */
.page{display:none;min-height:100vh;width:100%;background:#060608;}
.page.on{display:block;}
/* HOME */
.home{padding:60px 18px 60px;}
.eyebrow{font-size:10px;letter-spacing:6px;color:#00e5ff;text-transform:uppercase;margin-bottom:6px;}
.htitle{font-family:"Black Ops One",sans-serif;font-size:56px;letter-spacing:3px;color:#fff;line-height:.95;margin-bottom:4px;}
.htitle span{color:#00e5ff;}
.hsub{font-size:12px;color:#6a6a8a;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.wcard{position:relative;cursor:pointer;margin-bottom:10px;border-radius:16px;padding:18px 18px 18px 22px;background:#12121a;border:1px solid #2a2a3e;display:flex;align-items:center;gap:14px;overflow:hidden;}
.wbar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.wname{font-family:"Black Ops One",sans-serif;font-size:18px;color:#fff;}
.wtag{font-size:11px;color:#6a6a8a;margin-top:3px;}
.warr{margin-left:auto;font-size:22px;flex-shrink:0;}
/* OVERVIEW */
.ovhero{padding:52px 20px 20px;background:#060608;border-bottom:1px solid #1e1e2e;}
.ovback{font-size:12px;color:#6a6a8a;cursor:pointer;margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;display:inline-block;}
.ovtitle{font-family:"Black Ops One",sans-serif;font-size:34px;letter-spacing:2px;line-height:1;}
.ovtag{font-size:11px;color:#6a6a8a;margin-top:5px;letter-spacing:2px;text-transform:uppercase;}
.ovlist{padding:16px 18px 140px;}
.ovphase{font-size:9px;font-weight:700;letter-spacing:4px;color:#4a4a6a;text-transform:uppercase;padding:16px 0 8px;}
.ovgroup{border-radius:14px;background:#12121a;border:1px solid #2a2a3e;margin-bottom:10px;overflow:hidden;}
.ovpair{padding:8px 14px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid #1e1e2e;}
.ovitem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #1e1e2e;}
.ovitem:last-child{border-bottom:none;}
.ovltr{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.oviname{font-size:14px;font-weight:600;}
.ovimeta{font-size:11px;color:#6a6a8a;margin-top:2px;}
.ovbot{padding:16px 18px 40px;}
.ovbtn{width:100%;padding:17px;border:none;border-radius:14px;font-family:"Black Ops One",sans-serif;font-size:20px;letter-spacing:4px;color:#000;cursor:pointer;}
/* STORY */
.stbars{display:flex;gap:4px;padding:52px 16px 12px;background:#060608;}
.stbar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;}
.stfill{height:100%;border-radius:999px;}
.stbody{padding:0 18px 40px;}
.sthud{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-top:16px;}
.stbadge{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;}
.ststep{font-size:11px;color:#6a6a8a;letter-spacing:1px;}
.exblock{border-radius:14px;padding:14px;margin-bottom:10px;background:rgba(255,255,255,.04);border:1px solid #2a2a3e;}
.exltr{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:9px;font-weight:700;margin-right:8px;vertical-align:middle;}
.exname{font-family:"Black Ops One",sans-serif;letter-spacing:1px;line-height:1.1;margin-bottom:3px;}
.exmeta{font-size:12px;color:#6a6a8a;margin-bottom:8px;}
.excue{font-size:12px;line-height:1.6;color:rgba(255,255,255,.5);background:rgba(0,0,0,.35);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.prbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;border:1px solid;}
.setrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.dot{width:48px;height:48px;border-radius:10px;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:rgba(255,255,255,.3);cursor:pointer;}
.pdiv{text-align:center;font-size:9px;letter-spacing:4px;color:#4a4a6a;text-transform:uppercase;margin:6px 0;display:flex;align-items:center;gap:8px;}
.pdiv::before,.pdiv::after{content:"";flex:1;height:1px;background:#1e1e2e;}
.plankwrap{border-radius:14px;padding:20px;margin-bottom:10px;text-align:center;background:rgba(0,0,0,.4);border:1px solid #2a2a3e;}
.planktime{font-family:"Black Ops One",sans-serif;font-size:68px;line-height:1;margin-bottom:4px;}
.planklbl{font-size:9px;letter-spacing:4px;color:#4a4a6a;text-transform:uppercase;margin-bottom:14px;}
.plankbtn{display:inline-block;padding:11px 28px;border-radius:10px;font-family:"Black Ops One",sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;border:1.5px solid;}
.prrow{display:flex;gap:7px;margin-top:8px;}
.prinp{flex:1;padding:9px 10px;border-radius:10px;background:rgba(0,0,0,.5);border:1.5px solid #2a2a3e;color:#f0f0ff;font-size:14px;font-family:Rajdhani,sans-serif;font-weight:600;-webkit-appearance:none;}
.prinp:focus{outline:none;border-color:#00e5ff;}
.prsave{background:rgba(0,229,255,.08);border:1.5px solid rgba(0,229,255,.25);border-radius:10px;padding:9px 14px;color:#00e5ff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.navrow{display:flex;gap:10px;margin-top:16px;}
.stprev{flex:1;padding:15px;border:1.5px solid #2a2a3e;border-radius:13px;font-family:"Black Ops One",sans-serif;font-size:16px;letter-spacing:2px;color:#6a6a8a;cursor:pointer;background:transparent;text-align:center;}
.stnext{flex:2;padding:15px;border:none;border-radius:13px;font-family:"Black Ops One",sans-serif;font-size:18px;letter-spacing:4px;color:#000;cursor:pointer;text-align:center;}
/* REST - position fixed still needed here but with the iOS26 fix */
.restov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.restov.on{display:flex;background-color:#000000;}
.restlbl{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:#6a6a8a;}
.restnum{font-family:"Black Ops One",sans-serif;font-size:110px;line-height:1;color:#00e5ff;}
.restskip{margin-top:28px;padding:13px 40px;background:#1a1a1a;border:1px solid #2a2a3e;border-radius:12px;color:#6a6a8a;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;}
/* DONE */
.donepage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;background:#060608;}
.doneicon{font-size:64px;margin-bottom:12px;}
.donetitle{font-family:"Black Ops One",sans-serif;font-size:52px;letter-spacing:5px;margin-bottom:6px;}
.donestat{font-family:"Black Ops One",sans-serif;font-size:36px;color:#00e5ff;margin-bottom:4px;}
.donelbl{font-size:10px;letter-spacing:3px;color:#4a4a6a;text-transform:uppercase;margin-bottom:32px;}
.donesub{font-size:14px;color:#6a6a8a;margin-bottom:40px;line-height:1.7;}
.donehome{padding:15px 44px;border:none;border-radius:13px;font-family:"Black Ops One",sans-serif;font-size:18px;letter-spacing:3px;color:#000;cursor:pointer;background:#00e5ff;}

.wtype{font-family:Rajdhani,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 8px;border-radius:6px;text-transform:uppercase;}

/* SPOTIFY */
.sp-card{padding:0 18px 16px;}
.sp-inner{background:#12121a;border:1px solid #2a2a3e;border-radius:14px;padding:14px;}
.sp-label{font-size:9px;letter-spacing:3px;color:#1db954;text-transform:uppercase;margin-bottom:10px;font-weight:700;}
.sp-connect-wrap{display:flex;align-items:center;gap:12px;cursor:pointer;}
.sp-connect-wrap:active{opacity:.7;}
.sp-prow{display:flex;gap:12px;align-items:center;}
.sp-art{width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.sp-pname{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sp-pmeta{font-size:11px;color:#6a6a8a;margin-top:2px;}
.sp-open{display:block;margin-top:10px;padding:10px;background:#1db954;border-radius:10px;text-align:center;font-size:13px;font-weight:700;color:#000;letter-spacing:1px;text-decoration:none;}
.sp-open:active{opacity:.8;}
.sp-loading{font-size:12px;color:#6a6a8a;}
.sp-shuffle{display:inline-block;margin-top:10px;font-size:11px;color:#1db954;cursor:pointer;letter-spacing:1px;text-transform:uppercase;}
.sp-shuffle:active{opacity:.7;}
</style>

</head>
<body>
<div id="app">
  <div id="p-home" class="page on"></div>
  <div id="p-ov" class="page"></div>
  <div id="p-story" class="page"></div>
  <div id="p-done" class="page"></div>
</div>
<div class="restov" id="restov">
  <div class="restlbl">Rest</div>
  <div class="restnum" id="restnum">90</div>
  <div class="restlbl">seconds</div>
  <button class="restskip" id="restskip">SKIP REST</button>
</div>

<script>
// ── Spotify Integration ─────────────────────────────────────────────────────
// ✅ Set your Spotify app Client ID here after creating one at:
//    https://developer.spotify.com/dashboard
var SP_CLIENT_ID = '1afdf528c25c48eda1b760e8a5e6e196';
var SP_REDIRECT = (window.location.origin + window.location.pathname).replace(/\/+$/, '');
var SP_SCOPES   = 'playlist-read-private playlist-read-collaborative';

var SP_QUERIES = {
  push:     'push day chest shoulders workout pump',
  pull:     'pull day back biceps gym',
  lower:    'leg day squat workout power',
  upper:    'upper body lifting workout',
  recovery: 'yoga recovery stretch relax calm'
};

// PKCE helpers
function _spRand(n){
  var c='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~',
      r='',v=crypto.getRandomValues(new Uint8Array(n));
  for(var i=0;i<n;i++)r+=c[v[i]%c.length];
  return r;
}
async function _spChallenge(v){
  var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

async function spLogin(){
  var v=_spRand(64);
  localStorage.setItem('sp_cv',v);
  var ch=await _spChallenge(v);
  var p=new URLSearchParams({client_id:SP_CLIENT_ID,response_type:'code',redirect_uri:SP_REDIRECT,scope:SP_SCOPES,code_challenge_method:'S256',code_challenge:ch});
  window.location='https://accounts.spotify.com/authorize?'+p;
}

async function _spCallback(){
  var p=new URLSearchParams(window.location.search),code=p.get('code');
  if(!code)return;
  history.replaceState({},'',window.location.pathname);
  var cv=localStorage.getItem('sp_cv');if(!cv)return;
  var body=new URLSearchParams({grant_type:'authorization_code',code:code,redirect_uri:SP_REDIRECT,client_id:SP_CLIENT_ID,code_verifier:cv});
  var r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
  var d=await r.json();
  if(d.access_token){
    localStorage.setItem('sp_token',d.access_token);
    localStorage.setItem('sp_token_exp',Date.now()+d.expires_in*1000);
    if(d.refresh_token)localStorage.setItem('sp_rt',d.refresh_token);
  }
}

async function _spRefresh(){
  var rt=localStorage.getItem('sp_rt');if(!rt)return null;
  var body=new URLSearchParams({grant_type:'refresh_token',refresh_token:rt,client_id:SP_CLIENT_ID});
  var r=await fetch('https://accounts.spotify.com/api/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:body.toString()});
  var d=await r.json();
  if(d.access_token){
    localStorage.setItem('sp_token',d.access_token);
    localStorage.setItem('sp_token_exp',Date.now()+d.expires_in*1000);
    if(d.refresh_token)localStorage.setItem('sp_rt',d.refresh_token);
    return d.access_token;
  }
  return null;
}

function _spLiveToken(){var t=localStorage.getItem('sp_token'),e=localStorage.getItem('sp_token_exp');return(t&&e&&Date.now()<+e)?t:null;}
async function _spGetToken(){return _spLiveToken()||(await _spRefresh());}

async function spFetch(workoutKey,offset){
  var t=await _spGetToken();if(!t)return null;
  var q=SP_QUERIES[workoutKey]||'workout music';
  var o=(offset!=null)?offset:Math.floor(Math.random()*15);
  var r=await fetch('https://api.spotify.com/v1/search?q='+encodeURIComponent(q)+'&type=playlist&limit=1&offset='+o,{headers:{'Authorization':'Bearer '+t}});
  var d=await r.json();
  if(d.error&&d.error.status===401){localStorage.removeItem('sp_token');return null;}
  var items=(d.playlists&&d.playlists.items)?d.playlists.items.filter(Boolean):[];
  return items[0]||null;
}

function _spPlaylistHTML(p,key){
  var img=p.images&&p.images[0]?p.images[0].url:'';
  var h='<div class="sp-label">🎵 Recommended Playlist</div>';
  h+='<div class="sp-prow">';
  if(img)h+='<img class="sp-art" src="'+img+'">';
  h+='<div style="flex:1;min-width:0;"><div class="sp-pname">'+p.name+'</div>';
  var m=[];
  if(p.owner&&p.owner.display_name)m.push(p.owner.display_name);
  if(p.tracks)m.push(p.tracks.total+' tracks');
  if(m.length)h+='<div class="sp-pmeta">'+m.join(' · ')+'</div>';
  h+='</div></div>';
  h+='<a class="sp-open" href="'+p.external_urls.spotify+'" target="_blank">▶ OPEN IN SPOTIFY</a>';
  h+='<div class="sp-shuffle" id="sp-shuffle" data-key="'+key+'">↻ Different playlist</div>';
  return h;
}

function _spRenderConnectBtn(sec,msg){
  sec.innerHTML='<div class="sp-card"><div class="sp-inner"><div class="sp-connect-wrap" id="sp-cbtn">'
    +'<div style="font-size:22px;">🎵</div>'
    +'<div><div style="font-size:14px;font-weight:700;">Connect Spotify</div>'
    +'<div style="font-size:11px;color:#6a6a8a;margin-top:2px;">'+(msg||'Get a playlist for this workout')+'</div>'
    +'</div></div></div></div>';
  var btn=document.getElementById('sp-cbtn');
  if(btn)btn.onclick=spLogin;
}

function spRender(key){
  var sec=document.getElementById('sp-section');if(!sec)return;
  sec.setAttribute('data-key',key);
  if(SP_CLIENT_ID==='SPOTIFY_CLIENT_ID_PLACEHOLDER'){sec.innerHTML='';return;}
  if(!_spLiveToken()&&!localStorage.getItem('sp_rt')){_spRenderConnectBtn(sec);return;}
  sec.innerHTML='<div class="sp-card"><div class="sp-inner sp-loading-inner"><div class="sp-label">🎵 Recommended Playlist</div><div class="sp-loading">Finding your playlist…</div></div></div>';
  spFetch(key).then(function(p){
    var sec2=document.getElementById('sp-section');if(!sec2)return;
    if(!p){_spRenderConnectBtn(sec2,'Session expired — tap to reconnect');return;}
    sec2.innerHTML='<div class="sp-card"><div class="sp-inner" id="sp-inner">'+_spPlaylistHTML(p,key)+'</div></div>';
    _spBindShuffle();
  });
}

function _spBindShuffle(){
  var sh=document.getElementById('sp-shuffle');
  if(!sh)return;
  sh.onclick=function(){
    var key=this.getAttribute('data-key');
    var inner=document.getElementById('sp-inner');
    if(inner)inner.innerHTML='<div class="sp-label">🎵 Recommended Playlist</div><div class="sp-loading">Finding another…</div>';
    spFetch(key,Math.floor(Math.random()*30)).then(function(p){
      var inner2=document.getElementById('sp-inner');if(!inner2||!p)return;
      inner2.innerHTML=_spPlaylistHTML(p,key);
      _spBindShuffle();
    });
  };
}

// Wrap goOv on load
window.addEventListener('load',function(){
  _spCallback().then(function(){
    var origGoOv=window.goOv;
    if(!origGoOv)return;
    window.goOv=function(key){
      origGoOv(key);
      // Insert #sp-section before the start button
      if(document.getElementById('sp-section'))document.getElementById('sp-section').remove();
      var spDiv=document.createElement('div');
      spDiv.id='sp-section';
      var ovBot=document.querySelector('#p-ov .ovbot');
      if(ovBot)ovBot.parentNode.insertBefore(spDiv,ovBot);
      else{var pOv=document.getElementById('p-ov');if(pOv)pOv.appendChild(spDiv);}
      spRender(key);
    };
  });
});
</script>
