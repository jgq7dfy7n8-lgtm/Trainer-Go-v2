<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Trainer Go</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#04040a;}
body{background:#04040a;color:#f0f0ff;font-family:Rajdhani,sans-serif;min-height:100vh;}
.page{display:none;min-height:100vh;width:100%;background:#04040a;}
.page.on{display:block;}

/* GRID BG */
.gridbg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
  background-image:
    linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);
  background-size:40px 40px;}
.scanline{position:fixed;top:0;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.5),transparent);
  z-index:1;pointer-events:none;animation:scan 4s linear infinite;}
@keyframes scan{0%{top:-3px;}100%{top:100vh;}}

/* HOME */
.home{padding:60px 18px 80px;position:relative;z-index:2;}
.eyebrow{font-size:10px;letter-spacing:6px;color:#00e5ff;text-transform:uppercase;margin-bottom:8px;
  text-shadow:0 0 12px rgba(0,229,255,.9);}
.htitle{font-family:"Black Ops One",sans-serif;font-size:62px;letter-spacing:3px;color:#fff;line-height:.95;margin-bottom:6px;
  text-shadow:0 0 30px rgba(255,255,255,.25);}
.htitle span{color:#00e5ff;text-shadow:0 0 20px rgba(0,229,255,.9),0 0 40px rgba(0,229,255,.5);}
.hsub{font-size:12px;color:#8888b8;letter-spacing:4px;text-transform:uppercase;margin-bottom:36px;}

.wcard{position:relative;cursor:pointer;margin-bottom:12px;border-radius:18px;padding:20px 20px 20px 24px;
  background:linear-gradient(135deg,#111120 0%,#14141f 100%);
  border:1px solid #2e2e48;display:flex;align-items:center;gap:16px;overflow:hidden;
  transition:transform .15s,box-shadow .15s;}
.wcard:active{transform:scale(.98);}
.wcard::before{content:"";position:absolute;top:0;left:0;right:0;bottom:0;opacity:0;
  background:linear-gradient(135deg,rgba(255,255,255,.05),transparent);
  border-radius:18px;transition:opacity .2s;}
.wcard:hover::before{opacity:1;}
.wglow{position:absolute;top:0;left:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.wcard-inner{display:flex;flex-direction:column;flex:1;min-width:0;}
.wcard-top{display:flex;align-items:center;gap:14px;margin-bottom:2px;}
.wemoji{font-size:26px;flex-shrink:0;}
.wname{font-family:"Black Ops One",sans-serif;font-size:19px;color:#ffffff;letter-spacing:.5px;}
.wtag{font-size:12px;color:#9090be;letter-spacing:2px;margin-top:2px;padding-left:40px;font-weight:600;}
.warr{margin-left:auto;font-size:20px;flex-shrink:0;opacity:.9;}
.wbadge{position:absolute;top:12px;right:40px;font-size:9px;font-weight:700;letter-spacing:2px;
  padding:3px 8px;border-radius:20px;text-transform:uppercase;}

/* OVERVIEW */
.ovhero{padding:56px 20px 22px;position:relative;z-index:2;border-bottom:1px solid #1e1e38;}
.ovhero-bg{position:absolute;top:0;left:0;right:0;bottom:0;opacity:.12;z-index:-1;}
.ovback{font-size:11px;color:#8888aa;cursor:pointer;margin-bottom:16px;letter-spacing:3px;
  text-transform:uppercase;display:inline-flex;align-items:center;gap:6px;transition:color .2s;}
.ovback:hover{color:#00e5ff;}
.ovtitle{font-family:"Black Ops One",sans-serif;font-size:38px;letter-spacing:2px;line-height:1;}
.ovtag{font-size:12px;color:#9090be;margin-top:6px;letter-spacing:3px;text-transform:uppercase;font-weight:600;}
.ovlist{padding:16px 18px 140px;position:relative;z-index:2;}
.ovphase{font-size:9px;font-weight:700;letter-spacing:5px;color:#5a5a8a;text-transform:uppercase;padding:18px 0 10px;
  display:flex;align-items:center;gap:10px;}
.ovphase::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,#2a2a3e,transparent);}
.ovgroup{border-radius:16px;background:linear-gradient(135deg,#111120,#14141f);
  border:1px solid #2e2e48;margin-bottom:10px;overflow:hidden;}
.ovpair{padding:8px 16px;font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  border-bottom:1px solid #1e1e38;display:flex;align-items:center;gap:8px;}
.ovpair::before{content:"⚡";font-size:12px;}
.ovitem{display:flex;align-items:center;gap:14px;padding:14px 16px;border-bottom:1px solid #1e1e38;}
.ovitem:last-child{border-bottom:none;}
.ovltr{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;}
.oviname{font-size:16px;font-weight:700;letter-spacing:.3px;color:#f0f0ff;}
.ovimeta{font-size:12px;color:#9090be;margin-top:3px;font-weight:600;}
.ovpr{font-size:10px;font-weight:700;margin-top:3px;}
.ovbot{padding:16px 18px 48px;position:relative;z-index:2;}
.ovbtn{width:100%;padding:19px;border:none;border-radius:16px;font-family:"Black Ops One",sans-serif;
  font-size:21px;letter-spacing:5px;color:#000;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s;}
.ovbtn::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shimmer 2.5s infinite;}
@keyframes shimmer{0%{left:-100%;}100%{left:150%;}}
.ovbtn:active{transform:scale(.97);}

/* STORY */
.stbars{display:flex;gap:5px;padding:52px 18px 10px;position:relative;z-index:2;}
.stbar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;}
.stfill{height:100%;border-radius:999px;transition:width .3s;}
.stbody{padding:0 18px 40px;position:relative;z-index:2;}
.sthud{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-top:14px;}
.stbadge{font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;
  padding:4px 10px;border-radius:6px;border:1px solid;}
.ststep{font-size:12px;color:#9090be;letter-spacing:2px;margin-left:auto;font-weight:700;}

.exblock{border-radius:16px;padding:18px;margin-bottom:12px;
  background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.02) 100%);
  border:1px solid #2e2e48;position:relative;overflow:hidden;}
.exblock::before{content:"";position:absolute;top:0;left:0;width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);}
.exltr{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;
  border-radius:6px;font-size:10px;font-weight:700;margin-right:10px;vertical-align:middle;}
.exname{font-family:"Black Ops One",sans-serif;letter-spacing:1px;line-height:1.1;margin-bottom:4px;vertical-align:middle;}
.exmeta{font-size:13px;color:#a0a0cc;margin-bottom:10px;letter-spacing:.5px;font-weight:700;}
.excue{font-size:13px;line-height:1.8;color:rgba(255,255,255,.8);
  background:rgba(0,0,0,.5);border-radius:12px;padding:14px 16px;margin-bottom:12px;
  border-left:3px solid rgba(255,255,255,.2);}
.prbadge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;
  display:inline-flex;align-items:center;gap:5px;margin-bottom:10px;border:1px solid;}
.prbadge::before{content:"🏆";font-size:10px;}

.setrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.dot{width:52px;height:52px;border-radius:12px;border:1.5px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;
  color:rgba(255,255,255,.4);cursor:pointer;transition:all .2s;position:relative;}
.dot.done{color:#000 !important;transform:scale(1.05);}
.dot::after{content:"";position:absolute;inset:0;border-radius:12px;opacity:0;
  background:rgba(255,255,255,.1);transition:opacity .1s;}
.dot:active::after{opacity:1;}

.pdiv{text-align:center;font-size:9px;letter-spacing:5px;color:#5a5a8a;text-transform:uppercase;
  margin:8px 0;display:flex;align-items:center;gap:10px;}
.pdiv::before,.pdiv::after{content:"";flex:1;height:1px;
  background:linear-gradient(90deg,transparent,#2e2e48,transparent);}

.plankwrap{border-radius:16px;padding:24px;margin-bottom:12px;text-align:center;
  background:rgba(0,0,0,.5);border:1px solid;position:relative;overflow:hidden;}
.plankwrap::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:200px;height:200px;border-radius:50%;opacity:.05;
  background:radial-gradient(circle,currentColor,transparent);}
.planktime{font-family:"Black Ops One",sans-serif;font-size:76px;line-height:1;margin-bottom:4px;
  text-shadow:0 0 30px currentColor;}
.planklbl{font-size:10px;letter-spacing:5px;color:#9090be;text-transform:uppercase;margin-bottom:18px;font-weight:600;}
.plankbtn{display:inline-block;padding:13px 34px;border-radius:12px;font-family:"Black Ops One",sans-serif;
  font-size:15px;letter-spacing:3px;cursor:pointer;border:1.5px solid;transition:all .2s;}

.prrow{display:flex;gap:8px;margin-top:10px;}
.prinp{flex:1;padding:11px 12px;border-radius:12px;background:rgba(0,0,0,.6);
  border:1.5px solid #2e2e48;color:#f0f0ff;font-size:15px;font-family:Rajdhani,sans-serif;
  font-weight:700;-webkit-appearance:none;transition:border-color .2s;}
.prinp:focus{outline:none;border-color:#00e5ff;box-shadow:0 0 0 3px rgba(0,229,255,.12);}
.prsave{background:rgba(0,229,255,.08);border:1.5px solid rgba(0,229,255,.3);border-radius:12px;
  padding:11px 16px;color:#00e5ff;font-size:12px;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:all .2s;letter-spacing:1px;}
.prsave:hover{background:rgba(0,229,255,.15);border-color:rgba(0,229,255,.5);}

.navrow{display:flex;gap:12px;margin-top:18px;}
.stprev{flex:1;padding:16px;border:1.5px solid #2e2e48;border-radius:14px;
  font-family:"Black Ops One",sans-serif;font-size:16px;letter-spacing:2px;
  color:#8888aa;cursor:pointer;background:rgba(255,255,255,.03);text-align:center;transition:all .2s;}
.stprev:active{background:rgba(255,255,255,.07);}
.stnext{flex:2;padding:16px;border:none;border-radius:14px;font-family:"Black Ops One",sans-serif;
  font-size:19px;letter-spacing:4px;color:#000;cursor:pointer;text-align:center;
  position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.stnext::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);
  animation:shimmer 2s infinite;}
.stnext:active{transform:scale(.97);}

/* DONE */
.donepage{min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;text-align:center;background:#04040a;
  position:relative;overflow:hidden;}
.done-rays{position:absolute;top:50%;left:50%;width:600px;height:600px;
  transform:translate(-50%,-60%);opacity:.06;
  background:conic-gradient(from 0deg,transparent 0deg,#00e5ff 2deg,transparent 4deg,
    transparent 30deg,#00e5ff 32deg,transparent 34deg,transparent 60deg,
    #00e5ff 62deg,transparent 64deg,transparent 90deg,#00e5ff 92deg,transparent 94deg,
    transparent 120deg,#00e5ff 122deg,transparent 124deg,transparent 150deg,
    #00e5ff 152deg,transparent 154deg,transparent 180deg,#00e5ff 182deg,transparent 184deg,
    transparent 210deg,#00e5ff 212deg,transparent 214deg,transparent 240deg,
    #00e5ff 242deg,transparent 244deg,transparent 270deg,#00e5ff 272deg,transparent 274deg,
    transparent 300deg,#00e5ff 302deg,transparent 304deg,transparent 330deg,
    #00e5ff 332deg,transparent 334deg,transparent 360deg);
  animation:spin-rays 20s linear infinite;}
@keyframes spin-rays{from{transform:translate(-50%,-60%) rotate(0deg);}
  to{transform:translate(-50%,-60%) rotate(360deg);}}
.doneicon{font-size:72px;margin-bottom:16px;animation:pop .5s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop{0%{transform:scale(0);}100%{transform:scale(1);}}
.donetitle{font-family:"Black Ops One",sans-serif;font-size:58px;letter-spacing:6px;
  margin-bottom:8px;text-shadow:0 0 40px currentColor;}
.donestat{font-family:"Black Ops One",sans-serif;font-size:64px;color:#00e5ff;
  line-height:1;text-shadow:0 0 30px rgba(0,229,255,.7),0 0 60px rgba(0,229,255,.3);}
.donelbl{font-size:11px;letter-spacing:4px;color:#9090be;text-transform:uppercase;
  margin-bottom:8px;margin-top:4px;font-weight:600;}
.donesub{font-size:16px;color:#a0a0c8;margin-bottom:48px;line-height:1.8;margin-top:24px;}
.donehome{padding:16px 48px;border:none;border-radius:16px;font-family:"Black Ops One",sans-serif;
  font-size:19px;letter-spacing:4px;color:#000;cursor:pointer;background:#00e5ff;
  box-shadow:0 0 30px rgba(0,229,255,.4);transition:all .2s;}
.donehome:active{transform:scale(.97);}

/* UTILS */
.wtype{font-family:Rajdhani,sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;
  padding:4px 8px;border-radius:6px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="gridbg"></div>
<div class="scanline"></div>
<div id="app">
  <div id="p-home" class="page on"></div>
  <div id="p-ov" class="page"></div>
  <div id="p-story" class="page"></div>
  <div id="p-done" class="page"></div>
</div>
<script>
var CK=null,SI=0,SDA=0,SDB=0,PRS={},PT=null,PL=180,PIR=false;

function sg(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ex(a,b,c,d,e,f){return {name:a,meta:b,rest:c,type:d,sets:e,cue:f};}
function mk(p,e){return {phase:p,exs:e};}

var WK={
push:{name:"Push Day",tag:"Chest / Shoulders / Triceps",color:"#e8533a",emoji:"🔥",slides:[
mk("WARMUP",[ex("Arm Circles","2 × 10 reps each direction",0,"reps",2,"Stand tall with arms extended to your sides. Make slow, deliberate circles — 10 forward, then 10 backward. Increase the size of each circle as you go. This opens the rotator cuff and prepares the shoulder joint for pressing movements.")]),
mk("WARMUP",[ex("Plank Hold","3 minutes total",0,"plank",1,"Place forearms on the floor with elbows directly under your shoulders. Keep your body in a straight line from head to heels — no sagging hips, no raised butt. Squeeze your glutes and brace your abs like you're about to take a punch. Breathe steadily. 3 full unbroken minutes.")]),
mk("WARMUP",[ex("Pushup Warm-Up","2 × 10 reps",0,"reps",2,"Use a controlled 2-second descent and a 1-second pause at the bottom. This isn't a max-effort set — focus on feeling your chest, front delts, and triceps engage. Arms at 45 degrees from your torso, not flared wide.")]),
mk("WORKOUT",[
ex("Bench Press","4 sets × 8–10 reps",0,"weighted",4,"Arch your upper back slightly, plant your feet, and pull the bar out of the rack with control. Lower the bar to your mid-chest over 2 seconds — elbows at roughly 45 degrees from your body. Pause lightly at the chest, then press explosively. Squeeze the bar like you're trying to bend it. Drive your feet into the floor for full-body tension."),
ex("Incline DB Press","3 sets × 10–12 reps",0,"weighted",3,"Set the bench to 30–45 degrees. Bring the dumbbells to shoulder level with palms facing forward. Lower them slowly until you feel a deep stretch across your upper chest — do not bounce at the bottom. Press back to full extension without letting the dumbbells touch at the top, which keeps tension on the muscle the entire time.")
]),
mk("WORKOUT",[
ex("Lateral Raise","3 sets × 15 reps",0,"weighted",3,"Use lighter weight than you think you need — this is an isolation movement. Lead with your elbows, not your hands. Raise until your arms are parallel to the floor, pause for half a second, then lower slowly over 3 seconds. No shrugging or momentum swinging. If you're rocking, go lighter."),
ex("Tricep Pushdown","3 sets × 12–15 reps",0,"weighted",3,"Pin your elbows to your sides and do not let them drift forward at any point. Push the bar or rope down to full lockout — squeeze hard at the bottom for 1 second. Return slowly under control. Your elbows should be the only joint moving. This is the most common cable movement butchered in gyms — stay strict.")
]),
mk("WORKOUT",[
ex("Overhead Tricep Extension","3 sets × 12 reps",0,"weighted",3,"Hold the dumbbell or cable attachment overhead with both hands. Keep your elbows pointing forward — do not let them flare out to the sides. Lower the weight behind your head until you feel the long head of the tricep fully stretched, then press to full lockout overhead. The long head only gets this stretch when your arm is raised, so this movement is irreplaceable."),
ex("Core Finisher","10 minutes",0,"timed",1,"Cycle through: 60s plank, 20 dead bugs each side, 30s hollow hold, 20 bicycle crunches. Rest 20 seconds between each. Keep it moving — 10 minutes is the minimum. Your core is involved in every pressing movement; training it here carries over directly to your lifts.")
])
]},
pull:{name:"Pull Day",tag:"Back / Biceps",color:"#2a9aff",emoji:"💪",slides:[
mk("WARMUP",[ex("Shoulder Rolls","10 reps each direction",0,"reps",1,"Big, slow, deliberate circles — forward 10 times, backward 10 times. Feel the shoulder blade move through its full range. This primes the scapular muscles that control every pulling movement you're about to do.")]),
mk("WARMUP",[ex("Plank Hold","3 minutes total",0,"plank",1,"Forearms flat, elbows under shoulders. Maintain a rigid plank — no piking up, no sagging. Your core bracing here directly transfers to how well you can transmit force through your spine during rows and pulldowns. 3 full minutes.")]),
mk("WARMUP",[ex("Light Pulldowns","2 × 15 reps — 50% of working weight",0,"reps",2,"Before each rep, actively depress your shoulder blades — pull them down and together. This 'lat engagement' cue is the most important thing in all pulling work. Use light weight here to practice the movement pattern, not to fatigue. Full stretch at the top, full contraction at the bottom.")]),
mk("WORKOUT",[
ex("Wide Grip Lat Pulldown","4 sets × 8–10 reps",0,"weighted",4,"Depress and retract your shoulder blades before you initiate the pull — this activates the lats rather than the biceps. Pull the bar to your upper chest by driving your elbows down and back toward your hip pockets. Lean back slightly (10–15 degrees) for better lat engagement. Control the return — a 3-second negative builds more muscle than rushing back up."),
ex("Seated Cable Row","3 sets × 10–12 reps",0,"weighted",3,"Sit tall with a slight natural arch in your lower back. Pull to your navel, not your chest. Drive your elbows behind your torso as far as possible and hold the contraction for 1 full second. Then extend your arms under control — do not let the weight yank you forward. Your torso should barely move. If it's rocking a lot, the weight is too heavy.")
]),
mk("WORKOUT",[
ex("Close Grip Lat Pulldown","3 sets × 10–12 reps",0,"weighted",3,"Use a parallel close-grip handle. Sit tall and pull to your sternum — the close grip allows you to pull slightly lower than the wide grip, which hits the lower lats harder. Focus on the squeeze at the bottom: elbows back, chest up, shoulder blades pinched together. Slow negative."),
ex("Cable Bicep Curl","3 sets × 12–15 reps",0,"weighted",3,"Stand facing the low cable pulley. Pin your elbows to your sides — they must not drift forward during the curl. Curl fully to the top and squeeze hard, then lower all the way to full extension at the bottom. The full extension is where most people cheat — partial reps at the top mean you're skipping the most productive part of the movement. Use a lighter weight and do it right.")
]),
mk("WORKOUT",[
ex("Hammer Curl","3 sets × 12 reps each arm",0,"weighted",3,"Hold dumbbells with a neutral 'hammer' grip — thumbs pointing up. This targets the brachialis, a muscle underneath the bicep that, when developed, actually pushes your bicep higher and makes your arm look bigger. Curl smoothly without twisting your wrist. Alternate arms or do them simultaneously. 2-second up, 3-second down."),
ex("Core Finisher","10 minutes",0,"timed",1,"After heavy back work, your spine needs some direct stabilization work to maintain longevity. Cycle through: 60s plank, 20 dead bugs, 30s hollow hold, 15 hanging knee raises if you have a bar. Keep rest under 20 seconds between movements. This isn't optional — back training without core training is a long-term injury waiting to happen.")
])
]},
lower:{name:"Lower Body",tag:"Quads / Hamstrings / Glutes",color:"#3aaa5a",emoji:"⚡",slides:[
mk("WARMUP",[ex("Leg Swings","10 reps each direction",0,"reps",1,"Stand next to a wall for balance. Swing each leg forward and back 10 times to mobilize the hip flexors and hamstrings. Then swing each leg side to side 10 times to open the hip abductors. This is the single best warmup for squat and hinge patterns — don't skip it.")]),
mk("WARMUP",[ex("Plank Hold","3 minutes total",0,"plank",1,"Core bracing is essential for heavy lower body work. A strong brace under load protects your spine and transfers force from your legs to the bar. 3 full minutes — think of it as practicing the exact same brace you'll use during squats and deadlifts.")]),
mk("WARMUP",[ex("Bodyweight Squat","2 × 15 reps — slow tempo",0,"reps",2,"Feet shoulder-width, toes slightly out. Sit back and down to full depth — crease of your hip should pass below your knee. 3-second descent, pause 1 second at the bottom, stand up with control. This warms the knees, hips, and ankles and establishes the motor pattern before you add load.")]),
mk("WORKOUT",[
ex("Back Squat","4 sets × 6–8 reps",0,"weighted",4,"Take a big breath into your belly — not your chest — before you unrack the bar. Brace your entire core as if you're about to be hit. Feet shoulder-width, toes 15–30 degrees out. Break at the hips and knees simultaneously. Push your knees out in the direction of your toes. Descend until your hip crease passes below your knees. Drive up through your entire foot — not just your toes."),
ex("Romanian Deadlift","3 sets × 10 reps",0,"weighted",3,"Start standing with the bar at hip height. Push your hips backward while keeping the bar close to your body — it should practically drag down your legs. Your back stays neutral (not rounded) throughout. You should feel a deep stretch in your hamstrings at the bottom. Stop when your back starts to round. Drive your hips forward to stand up, squeezing your glutes at the top. This is a hinge, not a squat.")
]),
mk("WORKOUT",[
ex("Walking Lunges","3 sets × 10 reps each leg",0,"weighted",3,"Hold dumbbells at your sides or a barbell on your back. Step forward and lower your back knee toward the floor without letting it slam down. Front knee stays above your ankle — never caving inward. Keep your torso tall and upright throughout. The glute of your front leg should be doing most of the work. Drive through the heel of your front foot to step forward into the next rep."),
ex("Leg Press","3 sets × 12–15 reps",0,"weighted",3,"Set the seat so your knees form a 90-degree angle at the bottom. Place your feet shoulder-width at the center of the platform. Do not lock out your knees at the top — keep a slight bend to maintain tension on the quads throughout the set. Lower the platform slowly until your knees approach your chest, then press back powerfully. Never let your lower back round off the pad — if it does, you've gone too deep for your flexibility.")
]),
mk("WORKOUT",[
ex("Lying Leg Curl","3 sets × 12–15 reps",0,"weighted",3,"Lie face down and align your knees with the machine's pivot point. Curl the weight all the way up — hamstrings should be fully contracted at the top. Lower slowly over 3 seconds to full extension. The negative (lowering) phase builds as much or more muscle than the curl itself — don't let it drop. If you can't control the weight down, it's too heavy. Point your toes slightly outward to shift the load to the biceps femoris."),

(function(d){

var idx=parseInt(d.getAttribute("data-i")),s=parseInt(d.getAttribute("data-s")),t=parseInt(d.getAttribute("data-t"));
var color=WK[CK].color,cur=(idx===0?SDA:SDB),nd=(s<cur?s:s+1);
if(idx===0)SDA=nd;else SDB=nd;
for(var x=0;x<t;x++){
var dot=document.getElementById("d-"+idx+"-"+x);
if(!dot)continue;
if(x<nd){dot.style.borderColor=color;dot.style.color="#000";dot.style.background=color;dot.style.boxShadow="0 0 14px "+color+"99";dot.className="dot done";}
else{dot.style.borderColor="";dot.style.color="";dot.style.background="";dot.style.boxShadow="";dot.className="dot";}
}
};
}(dots[i]));
}
}

function bPR(){
for(var i=0;i<2;i++){
(function(idx){
var btn=document.getElementById("prs"+idx);
if(!btn)return;
btn.onclick=function(){
var sl=WK[CK].slides[SI];
if(!sl||!sl.exs[idx])return;
var we=document.getElementById("pw"+idx),re=document.getElementById("prr"+idx);
if(!we||!re)return;

if(!wv||!rv)return;
PRS[sl.exs[idx].name]={weight:wv,reps:rv,date:new Date().toISOString().split("T")[0]};
ss("wt_prs",PRS);we.value="";re.value="";

function toggleP(){
if(PIR){
PIR=false;if(PT){clearInterval(PT);PT=null;}
var b=document.getElementById("plankbtn");if(b)b.textContent="▶ RESUME";
}else{
PIR=true;if(PL<=0)PL=180;
var b2=document.getElementById("plankbtn");if(b2)b2.textContent="⏸ PAUSE";
PT=setInterval(function(){
PL-=1;
var d=document.getElementById("plankdisp");
if(d){var m=Math.floor(PL/60),sc=PL%60;d.textContent=m+":"+(sc<10?"0":"")+sc;}
if(PL<=0){
clearInterval(PT);PT=null;PIR=false;
var d2=document.getElementById("plankdisp");if(d2)d2.textContent="DONE!";
var b3=document.getElementById("plankbtn");
if(b3){b3.textContent="↺ RESET";b3.onclick=function(){PL=180;var d3=document.getElementById("plankdisp");if(d3)d3.textContent="3:00";b3.textContent="▶ START TIMER";b3.onclick=function(){toggleP();};};}
}
},1000);
}
}

function stopT(){
if(PT){clearInterval(PT);PT=null;}
PIR=false;
}

function goDone(){
stopT();
var w=WK[CK],el=document.getElementById("p-done");if(!el)return;
var tot=0;
for(var i=0;i<w.slides.length;i++)for(var j=0;j<w.slides[i].exs.length;j++)tot+=w.slides[i].exs[j].sets;
var h="<div class='done-rays'></div>";
h+="<div class='doneicon'>"+w.emoji+"</div>";
h+="<div class='donetitle' style='color:"+w.color+";'>DONE!</div>";
h+="<div class='donestat'>"+tot+"</div>";
h+="<div class='donelbl'>sets completed</div>";
h+="<div class='donesub'>"+w.name+" complete.<br>You showed up. That's everything.</div>";
h+="<button class='donehome' id='donehome' style='background:"+w.color+";box-shadow:0 8px 40px "+w.color+"66;'>← BACK HOME</button>";
el.innerHTML=h;
document.getElementById("donehome").onclick=function(){goHome();};
pg("p-done");
}

try{goHome();}catch(err){document.body.style.background="#fff";document.body.style.color="#000";document.body.style.padding="40px";document.body.style.fontSize="16px";document.body.innerHTML="<h2>JS Error</h2><pre>"+err.message+"</pre><pre>"+err.stack+"</pre>";}
</script>
