<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Trainer Go</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#060608;}
body{background:#060608;color:#f0f0ff;font-family:Rajdhani,sans-serif;min-height:100vh;}
/* NO position:fixed on pages - use display none/block only */
.page{display:none;min-height:100vh;width:100%;background:#060608;}
.page.on{display:block;}
/* HOME */
.home{padding:60px 18px 60px;}
.eyebrow{font-size:10px;letter-spacing:6px;color:#00e5ff;text-transform:uppercase;margin-bottom:6px;}
.htitle{font-family:"Black Ops One",sans-serif;font-size:56px;letter-spacing:3px;color:#fff;line-height:.95;margin-bottom:4px;}
.htitle span{color:#00e5ff;}
.hsub{font-size:12px;color:#6a6a8a;letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.wcard{position:relative;cursor:pointer;margin-bottom:10px;border-radius:16px;padding:18px 18px 18px 22px;background:#12121a;border:1px solid #2a2a3e;display:flex;align-items:center;gap:14px;overflow:hidden;}
.wbar{position:absolute;left:0;top:0;bottom:0;width:3px;}
.wname{font-family:"Black Ops One",sans-serif;font-size:18px;color:#fff;}
.wtag{font-size:11px;color:#6a6a8a;margin-top:3px;}
.warr{margin-left:auto;font-size:22px;flex-shrink:0;}
/* OVERVIEW */
.ovhero{padding:52px 20px 20px;background:#060608;border-bottom:1px solid #1e1e2e;}
.ovback{font-size:12px;color:#6a6a8a;cursor:pointer;margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;display:inline-block;}
.ovtitle{font-family:"Black Ops One",sans-serif;font-size:34px;letter-spacing:2px;line-height:1;}
.ovtag{font-size:11px;color:#6a6a8a;margin-top:5px;letter-spacing:2px;text-transform:uppercase;}
.ovlist{padding:16px 18px 140px;}
.ovphase{font-size:9px;font-weight:700;letter-spacing:4px;color:#4a4a6a;text-transform:uppercase;padding:16px 0 8px;}
.ovgroup{border-radius:14px;background:#12121a;border:1px solid #2a2a3e;margin-bottom:10px;overflow:hidden;}
.ovpair{padding:8px 14px;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border-bottom:1px solid #1e1e2e;}
.ovitem{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #1e1e2e;}
.ovitem:last-child{border-bottom:none;}
.ovltr{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.oviname{font-size:14px;font-weight:600;}
.ovimeta{font-size:11px;color:#6a6a8a;margin-top:2px;}
.ovbot{padding:16px 18px 40px;}
.ovbtn{width:100%;padding:17px;border:none;border-radius:14px;font-family:"Black Ops One",sans-serif;font-size:20px;letter-spacing:4px;color:#000;cursor:pointer;}
/* STORY */
.stbars{display:flex;gap:4px;padding:52px 16px 12px;background:#060608;}
.stbar{flex:1;height:3px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;}
.stfill{height:100%;border-radius:999px;}
.stbody{padding:0 18px 40px;}
.sthud{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-top:16px;}
.stbadge{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:3px 8px;border-radius:4px;border:1px solid;}
.ststep{font-size:11px;color:#6a6a8a;letter-spacing:1px;}
.exblock{border-radius:14px;padding:14px;margin-bottom:10px;background:rgba(255,255,255,.04);border:1px solid #2a2a3e;}
.exltr{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:9px;font-weight:700;margin-right:8px;vertical-align:middle;}
.exname{font-family:"Black Ops One",sans-serif;letter-spacing:1px;line-height:1.1;margin-bottom:3px;}
.exmeta{font-size:12px;color:#6a6a8a;margin-bottom:8px;}
.excue{font-size:12px;line-height:1.6;color:rgba(255,255,255,.5);background:rgba(0,0,0,.35);border-radius:10px;padding:10px 12px;margin-bottom:10px;}
.prbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:8px;border:1px solid;}
.setrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.dot{width:48px;height:48px;border-radius:10px;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:rgba(255,255,255,.3);cursor:pointer;}
.pdiv{text-align:center;font-size:9px;letter-spacing:4px;color:#4a4a6a;text-transform:uppercase;margin:6px 0;display:flex;align-items:center;gap:8px;}
.pdiv::before,.pdiv::after{content:"";flex:1;height:1px;background:#1e1e2e;}
.plankwrap{border-radius:14px;padding:20px;margin-bottom:10px;text-align:center;background:rgba(0,0,0,.4);border:1px solid #2a2a3e;}
.planktime{font-family:"Black Ops One",sans-serif;font-size:68px;line-height:1;margin-bottom:4px;}
.planklbl{font-size:9px;letter-spacing:4px;color:#4a4a6a;text-transform:uppercase;margin-bottom:14px;}
.plankbtn{display:inline-block;padding:11px 28px;border-radius:10px;font-family:"Black Ops One",sans-serif;font-size:15px;letter-spacing:2px;cursor:pointer;border:1.5px solid;}
.prrow{display:flex;gap:7px;margin-top:8px;}
.prinp{flex:1;padding:9px 10px;border-radius:10px;background:rgba(0,0,0,.5);border:1.5px solid #2a2a3e;color:#f0f0ff;font-size:14px;font-family:Rajdhani,sans-serif;font-weight:600;-webkit-appearance:none;}
.prinp:focus{outline:none;border-color:#00e5ff;}
.prsave{background:rgba(0,229,255,.08);border:1.5px solid rgba(0,229,255,.25);border-radius:10px;padding:9px 14px;color:#00e5ff;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;}
.navrow{display:flex;gap:10px;margin-top:16px;}
.stprev{flex:1;padding:15px;border:1.5px solid #2a2a3e;border-radius:13px;font-family:"Black Ops One",sans-serif;font-size:16px;letter-spacing:2px;color:#6a6a8a;cursor:pointer;background:transparent;text-align:center;}
.stnext{flex:2;padding:15px;border:none;border-radius:13px;font-family:"Black Ops One",sans-serif;font-size:18px;letter-spacing:4px;color:#000;cursor:pointer;text-align:center;}
/* REST - position fixed still needed here but with the iOS26 fix */
.restov{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
.restov.on{display:flex;background-color:#000000;}
.restlbl{font-size:10px;letter-spacing:5px;text-transform:uppercase;color:#6a6a8a;}
.restnum{font-family:"Black Ops One",sans-serif;font-size:110px;line-height:1;color:#00e5ff;}
.restskip{margin-top:28px;padding:13px 40px;background:#1a1a1a;border:1px solid #2a2a3e;border-radius:12px;color:#6a6a8a;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:2px;text-transform:uppercase;}
/* DONE */
.donepage{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;background:#060608;}
.doneicon{font-size:64px;margin-bottom:12px;}
.donetitle{font-family:"Black Ops One",sans-serif;font-size:52px;letter-spacing:5px;margin-bottom:6px;}
.donestat{font-family:"Black Ops One",sans-serif;font-size:36px;color:#00e5ff;margin-bottom:4px;}
.donelbl{font-size:10px;letter-spacing:3px;color:#4a4a6a;text-transform:uppercase;margin-bottom:32px;}
.donesub{font-size:14px;color:#6a6a8a;margin-bottom:40px;line-height:1.7;}
.donehome{padding:15px 44px;border:none;border-radius:13px;font-family:"Black Ops One",sans-serif;font-size:18px;letter-spacing:3px;color:#000;cursor:pointer;background:#00e5ff;}
</style>
</head>
<body>
<div id="app">
  <div id="p-home" class="page on"></div>
  <div id="p-ov" class="page"></div>
  <div id="p-story" class="page"></div>
  <div id="p-done" class="page"></div>
</div>
<div class="restov" id="restov">
  <div class="restlbl">Rest</div>
  <div class="restnum" id="restnum">90</div>
  <div class="restlbl">seconds</div>
  <button class="restskip" id="restskip">SKIP REST</button>
</div>
<script type="text/javascript">
var CK=null,SI=0,SDA=0,SDB=0,PRS={},RT=null,RL=0,PT=null,PL=180,PIR=false;

function sg(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function ss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function ex(a,b,c,d,e,f){return {name:a,meta:b,rest:c,type:d,sets:e,cue:f};}
function mk(p,e){return {phase:p,exs:e};}

var WK={
push:{name:“Push Day”,tag:“Chest / Shoulders / Triceps”,color:”#e8533a”,slides:[
mk(“WARMUP”,[ex(“Arm Circles”,“2 x 10 each”,0,“reps”,2,“Roll shoulders forward 10 times then backward. Opens the rotator cuff.”)]),
mk(“WARMUP”,[ex(“Plank”,“3 minutes”,0,“plank”,1,“Elbows under shoulders. Squeeze glutes and abs. 3 full minutes, no breaks.”)]),
mk(“WARMUP”,[ex(“Pushup Warm-Up”,“2 x 10 reps”,30,“reps”,2,“Controlled tempo. Gets blood into chest, shoulders, and triceps.”)]),
mk(“WORKOUT”,[
ex(“Bench Press”,“4 sets x 8-10 reps”,90,“weighted”,4,“Bar to mid-chest, elbows 45 degrees. Lower 2 seconds, press explosively.”),
ex(“Incline DB Press”,“3 sets x 10-12 reps”,75,“weighted”,3,“30-45 degree bench. Feel the stretch at the bottom.”)
]),
mk(“WORKOUT”,[
ex(“Lateral Raise”,“3 sets x 15 reps”,60,“weighted”,3,“Lead with elbows not hands. Lighter than you think.”),
ex(“Tricep Pushdown”,“3 sets x 12-15 reps”,60,“weighted”,3,“Elbows pinned. Full lockout every rep.”)
]),
mk(“WORKOUT”,[
ex(“Overhead Tricep Ext”,“3 sets x 12 reps”,60,“weighted”,3,“Elbows forward, do not flare. Deep stretch at the top.”),
ex(“Core”,“10 minutes”,0,“timed”,1,“Plank, dead bugs, hollow holds. Non-negotiable.”)
])
]},
pull:{name:“Pull Day”,tag:“Back / Biceps”,color:”#2a7aaa”,slides:[
mk(“WARMUP”,[ex(“Shoulder Rolls”,“10 each direction”,0,“reps”,1,“Big slow circles forward then back.”)]),
mk(“WARMUP”,[ex(“Plank”,“3 minutes”,0,“plank”,1,“Elbows under shoulders. Core braced. 3 full minutes.”)]),
mk(“WARMUP”,[ex(“Light Pulldowns”,“2 x 15 reps”,30,“reps”,2,“Light weight, full range. Depress shoulder blades before each pull.”)]),
mk(“WORKOUT”,[
ex(“Wide Grip Pulldown”,“4 sets x 8-10 reps”,90,“weighted”,4,“Depress shoulder blades. Drive elbows to hip pockets.”),
ex(“Seated Cable Row”,“3 sets x 10-12 reps”,75,“weighted”,3,“Pull to navel. Elbows behind torso. 1 second pause.”)
]),
mk(“WORKOUT”,[
ex(“Close Grip Pulldown”,“3 sets x 10-12 reps”,75,“weighted”,3,“Chest tall, pull to sternum. Hits lower lats.”),
ex(“Cable Bicep Curl”,“3 sets x 12-15 reps”,60,“weighted”,3,“Elbows pinned. Full extension at the bottom.”)
]),
mk(“WORKOUT”,[
ex(“Hammer Curl”,“3 sets x 12 reps”,60,“weighted”,3,“Neutral grip. Builds the brachialis.”),
ex(“Core”,“10 minutes”,0,“timed”,1,“Core after back protects your spine.”)
])
]},
lower:{name:“Lower Body”,tag:“Quads / Hamstrings / Glutes”,color:”#5a8a3a”,slides:[
mk(“WARMUP”,[ex(“Leg Swings”,“10 each direction”,0,“reps”,1,“Swing each leg forward-back then side-to-side.”)]),
mk(“WARMUP”,[ex(“Plank”,“3 minutes”,0,“plank”,1,“Elbows under shoulders. 3 full minutes.”)]),
mk(“WARMUP”,[ex(“Bodyweight Squat”,“2 x 15 reps”,30,“reps”,2,“Full depth, slow. Warms knees, hips, and ankles.”)]),
mk(“WORKOUT”,[
ex(“Back Squat”,“4 sets x 6-8 reps”,120,“weighted”,4,“Big breath, brace hard. Knees out. Hit parallel every rep.”),
ex(“Romanian Deadlift”,“3 sets x 10 reps”,90,“weighted”,3,“Hinge at hips, push them back. Feel hamstrings load.”)
]),
mk(“WORKOUT”,[
ex(“Walking Lunges”,“3 sets x 10 each leg”,75,“weighted”,3,“Torso upright. Front knee over toes.”),
ex(“Leg Press”,“3 sets x 12-15 reps”,75,“weighted”,3,“Do not lock out at top. Keep tension.”)
]),
mk(“WORKOUT”,[
ex(“Leg Curl”,“3 sets x 12-15 reps”,60,“weighted”,3,“2 seconds up, 3 seconds down. Full range.”),
ex(“Calf Raises”,“3 sets x 20 reps”,45,“weighted”,3,“Full stretch at bottom. 2s up, 1s hold, 2s down.”)
])
]},
upper:{name:“Upper Body”,tag:“Chest / Back / Arms”,color:”#8a5ac8”,slides:[
mk(“WARMUP”,[ex(“Arm Circles”,“10 each direction”,0,“reps”,1,“Forward and backward. Gets the shoulder joint warm.”)]),
mk(“WARMUP”,[ex(“Plank”,“3 minutes”,0,“plank”,1,“Elbows under shoulders. 3 full minutes.”)]),
mk(“WARMUP”,[ex(“Pushups”,“2 x 10 reps”,30,“reps”,2,“Controlled tempo. Warms chest, shoulders, and triceps.”)]),
mk(“WORKOUT”,[
ex(“Bench Press”,“4 sets x 8-10 reps”,90,“weighted”,4,“Chest drives the bar, not shoulders or triceps.”),
ex(“Wide Grip Pulldown”,“3 sets x 10-12 reps”,75,“weighted”,3,“Shoulder blades down before pulling.”)
]),
mk(“WORKOUT”,[
ex(“DB Shoulder Press”,“3 sets x 10-12 reps”,75,“weighted”,3,“Brace core before every rep. Full lockout overhead.”),
ex(“Seated Cable Row”,“3 sets x 10-12 reps”,75,“weighted”,3,“1 second pause at contraction. Elbows behind torso.”)
]),
mk(“WORKOUT”,[
ex(“Bicep and Tricep Superset”,“3 sets x 12 each”,75,“weighted”,3,“12 curls then immediately 12 pushdowns. Zero rest between. Then rest 75 seconds.”),
ex(“Core”,“10 minutes”,0,“timed”,1,“Plank, dead bugs, hollow holds.”)
])
]},
recovery:{name:“Active Recovery”,tag:“Mobility / Flexibility”,color:”#c8882a”,slides:[
mk(“WARMUP”,[ex(“Easy Walk”,“5 minutes”,0,“timed”,1,“Slow pace. Gets blood moving before stretching.”)]),
mk(“WARMUP”,[ex(“Plank”,“3 minutes”,0,“plank”,1,“Even on recovery days. 3 full minutes.”)]),
mk(“WORKOUT”,[
ex(“Hip Flexor Stretch”,“2 x 45s each side”,30,“timed”,2,“Kneeling lunge, shift hips forward. Hold and breathe.”),
ex(“Pigeon Pose”,“2 x 60s each side”,30,“timed”,2,“Let gravity pull you down. Best hip stretch available.”)
]),
mk(“WORKOUT”,[
ex(“Hamstring Stretch”,“2 x 45s each side”,30,“timed”,2,“Flat back. Hinge from hips not spine.”),
ex(“Foam Roll”,“5 minutes”,0,“timed”,1,“Hold 20-30 seconds on tender spots.”)
])
]
}
};

var EM={push:“💪”,pull:“🔗”,lower:“🦵”,upper:“🏋”,recovery:“🧘”};

function pg(id){
var ids=[“p-home”,“p-ov”,“p-story”,“p-done”];
for(var i=0;i<ids.length;i++){
var e=document.getElementById(ids[i]);
if(e)e.className=“page”+(ids[i]===id?” on”:””);
}
window.scrollTo(0,0);
}

function goHome(){
PRS=sg(“wt_prs”,{});
stopT();
var el=document.getElementById(“p-home”);
if(!el)return;
var keys=[“push”,“pull”,“lower”,“upper”,“recovery”];
var h=”<div class='home'>”;
h+=”<div class='eyebrow'>Your Training System</div>”;
h+=”<div class='htitle'>TRAINER<span>GO</span></div>”;
h+=”<div class='hsub'>Select your program</div>”;
for(var i=0;i<keys.length;i++){
var k=keys[i],w=WK[k];
h+=”<div class='wcard' id='wc-"+k+"'>”;
h+=”<div class='wbar' style='background:"+w.color+";'></div>”;
h+=”<span style='font-size:28px;'>”+EM[k]+”</span>”;
h+=”<div><div class='wname'>”+w.name+”</div><div class='wtag'>”+w.tag+”</div></div>”;
h+=”<div class='warr' style='color:"+w.color+";'>›</div>”;
h+=”</div>”;
}
h+=”</div>”;
el.innerHTML=h;
for(var j=0;j<keys.length;j++){
(function(key){
var c=document.getElementById(“wc-”+key);
if(c)c.onclick=function(){goOv(key);};
}(keys[j]));
}
pg(“p-home”);
}

function goOv(key){
CK=key;
var w=WK[key];
var el=document.getElementById(“p-ov”);
if(!el)return;
var h=”<div class='ovhero'>”;
h+=”<div class='ovback' id='ovback'>← BACK</div>”;
h+=”<div class='ovtitle' style='color:"+w.color+";'>”+EM[key]+” “+w.name.toUpperCase()+”</div>”;
h+=”<div class='ovtag'>”+w.tag+”</div>”;
h+=”</div>”;
h+=”<div class='ovlist'>”;
var lp=””;
for(var i=0;i<w.slides.length;i++){
var s=w.slides[i];
if(s.phase!==lp){lp=s.phase;h+=”<div class='ovphase'>”+s.phase+”</div>”;}
h+=”<div class='ovgroup'>”;
if(s.exs.length===2)h+=”<div class='ovpair' style='color:"+w.color+";background:"+w.color+"10;'>PAIRED EXERCISES</div>”;
for(var j=0;j<s.exs.length;j++){
var e=s.exs[j],pi=PRS[e.name];
h+=”<div class='ovitem'>”;
h+=”<div class='ovltr' style='background:"+w.color+"15;border:1px solid "+w.color+"40;color:"+w.color+";'>”+(j===0?“A”:“B”)+”</div>”;
h+=”<div><div class='oviname'>”+e.name+”</div>”;
h+=”<div class='ovimeta'>”+e.meta+(pi?” · PR: “+pi.weight+“lb x “+pi.reps:””)+”</div></div>”;
h+=”</div>”;
}
h+=”</div>”;
}
h+=”</div>”;
h+=”<div class='ovbot'><button class='ovbtn' id='ovstart' style='background:"+w.color+";'>START WORKOUT</button></div>”;
el.innerHTML=h;
document.getElementById(“ovback”).onclick=function(){goHome();};
document.getElementById(“ovstart”).onclick=function(){SI=0;SDA=0;SDB=0;goStory();};
pg(“p-ov”);
}

function goStory(){
stopT();
var w=WK[CK],slide=w.slides[SI],tot=w.slides.length;
var el=document.getElementById(“p-story”);
if(!el)return;
var bars=””;
for(var i=0;i<tot;i++){
bars+=”<div class='stbar'><div class='stfill' style='width:"+(i<SI?100:0)+"%;background:"+w.color+";'></div></div>”;
}
var h=”<div style='background:linear-gradient(180deg,"+w.color+"20 0%,#060608 40%);'>”;
h+=”<div class='stbars'>”+bars+”</div>”;
h+=”<div class='stbody'>”;
h+=”<div class='sthud'><span class='stbadge' style='color:"+w.color+";border-color:"+w.color+"40;'>”+slide.phase+”</span>”;
h+=”<span class='ststep'>”+(SI+1)+” OF “+tot+”</span></div>”;
if(slide.exs.length===1){
h+=bEx(slide.exs[0],“A”,w.color,0,SDA,true);
}else{
h+=bEx(slide.exs[0],“A”,w.color,0,SDA,false);
h+=”<div class='pdiv'>THEN</div>”;
h+=bEx(slide.exs[1],“B”,w.color,1,SDB,false);
}
h+=”<div class='navrow'>”;
h+=”<button class='stprev' id='stprev'>← BACK</button>”;
h+=”<button class='stnext' id='stnext' style='background:"+w.color+";'>”+(SI===tot-1?“FINISH”:“NEXT ›”)+”</button>”;
h+=”</div></div></div>”;
el.innerHTML=h;
document.getElementById(“stprev”).onclick=function(){if(SI<=0){goOv(CK);}else{SI–;SDA=0;SDB=0;goStory();}};
document.getElementById(“stnext”).onclick=function(){if(SI>=WK[CK].slides.length-1){goDone();}else{SI++;SDA=0;SDB=0;goStory();}};
var pb=document.getElementById(“plankbtn”);
if(pb)pb.onclick=function(){toggleP();};
bDots();bPR();
pg(“p-story”);
PL=180;PIR=false;
}

function bEx(e,label,color,idx,done,big){
var h=”<div class='exblock' style='border-left:3px solid "+color+";'>”;
h+=”<div style='margin-bottom:8px;'><span class='exltr' style='background:"+color+"20;border:1px solid "+color+"50;color:"+color+";'>”+label+”</span>”;
h+=”<span class='exname' style='font-size:"+(big?"28":"22")+"px;color:"+color+";'>”+e.name+”</span></div>”;
var pi=PRS[e.name];
if(pi)h+=”<div class='prbadge' style='background:"+color+"15;color:"+color+";border-color:"+color+"35;'>PR: “+pi.weight+“lb x “+pi.reps+”</div>”;
h+=”<div class='exmeta'>”+e.meta+”</div><div class='excue'>”+e.cue+”</div>”;
if(e.type===“plank”){
h+=”<div class='plankwrap' style='border-color:"+color+"30;'>”;
h+=”<div class='planktime' id='plankdisp' style='color:"+color+";'>3:00</div>”;
h+=”<div class='planklbl'>hold</div>”;
h+=”<div class='plankbtn' id='plankbtn' style='color:"+color+";border-color:"+color+"50;background:"+color+"10;'>START TIMER</div>”;
h+=”</div>”;
}
if(e.type===“weighted”||e.type===“reps”){
h+=”<div class='setrow' id='dr-"+idx+"'>”;
for(var s=0;s<e.sets;s++){
var hit=(s<done),ds=hit?“border-color:”+color+”;color:#000;background:”+color+”;”  :””;
h+=”<div class='dot' id='d-"+idx+"-"+s+"' style='"+ds+"' data-i='"+idx+"' data-s='"+s+"' data-t='"+e.sets+"' data-r='"+e.rest+"'>”+( s+1)+”</div>”;
}
h+=”</div>”;
h+=”<div class='prrow'><input class='prinp' id='pw"+idx+"' type='number' placeholder='lbs'>”;
h+=”<input class='prinp' id='prr"+idx+"' type='number' placeholder='reps'>”;
h+=”<div class='prsave' id='prs"+idx+"'>Save PR</div></div>”;
}
return h+”</div>”;
}

function bDots(){
var dots=document.querySelectorAll(”.dot”);
for(var i=0;i<dots.length;i++){
(function(d){
d.onclick=function(){
var idx=parseInt(d.getAttribute(“data-i”)),s=parseInt(d.getAttribute(“data-s”)),t=parseInt(d.getAttribute(“data-t”)),r=parseInt(d.getAttribute(“data-r”));
var color=WK[CK].color,cur=(idx===0?SDA:SDB),nd=(s<cur?s:s+1);
if(idx===0)SDA=nd;else SDB=nd;
for(var x=0;x<t;x++){
var dot=document.getElementById(“d-”+idx+”-”+x);
if(!dot)continue;
if(x<nd){dot.style.borderColor=color;dot.style.color=”#000”;dot.style.background=color;}
else{dot.style.borderColor=””;dot.style.color=””;dot.style.background=””;}
}
if(nd>0&&nd<t&&r>0)showRest(r);
};
}(dots[i]));
}
}

function bPR(){
for(var i=0;i<2;i++){
(function(idx){
var btn=document.getElementById(“prs”+idx);
if(!btn)return;
btn.onclick=function(){
var sl=WK[CK].slides[SI];
if(!sl||!sl.exs[idx])return;
var we=document.getElementById(“pw”+idx),re=document.getElementById(“prr”+idx);
if(!we||!re)return;
var wv=parseFloat(we.value),rv=parseInt(re.value);
if(!wv||!rv)return;
PRS[sl.exs[idx].name]={weight:wv,reps:rv,date:new Date().toISOString().split(“T”)[0]};
ss(“wt_prs”,PRS);we.value=””;re.value=””;
btn.textContent=“Saved!”;
setTimeout(function(){btn.textContent=“Save PR”;},1200);
};
}(i));
}
}

function toggleP(){
if(PIR){
PIR=false;if(PT){clearInterval(PT);PT=null;}
var b=document.getElementById(“plankbtn”);if(b)b.textContent=“RESUME”;
}else{
PIR=true;if(PL<=0)PL=180;
var b2=document.getElementById(“plankbtn”);if(b2)b2.textContent=“PAUSE”;
PT=setInterval(function(){
PL–;
var d=document.getElementById(“plankdisp”);
if(d){var m=Math.floor(PL/60),sc=PL%60;d.textContent=m+”:”+(sc<10?“0”:””)+sc;}
if(PL<=0){
clearInterval(PT);PT=null;PIR=false;
var d2=document.getElementById(“plankdisp”);if(d2)d2.textContent=“DONE!”;
var b3=document.getElementById(“plankbtn”);
if(b3){b3.textContent=“RESET”;b3.onclick=function(){PL=180;var d3=document.getElementById(“plankdisp”);if(d3)d3.textContent=“3:00”;b3.textContent=“START TIMER”;b3.onclick=function(){toggleP();};};}
}
},1000);
}
}

function showRest(secs){
RL=secs;
var ov=document.getElementById(“restov”);if(!ov)return;
ov.className=“restov on”;
var rn=document.getElementById(“restnum”);if(rn)rn.textContent=RL;
if(RT)clearInterval(RT);
RT=setInterval(function(){
RL–;
var rn2=document.getElementById(“restnum”);if(rn2)rn2.textContent=RL;
if(RL<=0){clearInterval(RT);RT=null;var o=document.getElementById(“restov”);if(o)o.className=“restov”;}
},1000);
}

function stopT(){
if(RT){clearInterval(RT);RT=null;}
if(PT){clearInterval(PT);PT=null;}
PIR=false;
var ov=document.getElementById(“restov”);if(ov)ov.className=“restov”;
}

function goDone(){
stopT();
var w=WK[CK],el=document.getElementById(“p-done”);if(!el)return;
var tot=0;
for(var i=0;i<w.slides.length;i++)for(var j=0;j<w.slides[i].exs.length;j++)tot+=w.slides[i].exs[j].sets;
var h=”<div class='donepage'><div class='doneicon'>⚡</div>”;
h+=”<div class='donetitle' style='color:"+w.color+";'>DONE!</div>”;
h+=”<div class='donestat'>”+tot+”</div><div class='donelbl'>sets completed</div>”;
h+=”<div class='donesub'>”+w.name+” complete.</div>”;
h+=”<button class='donehome' id='donehome'>BACK HOME</button></div>”;
el.innerHTML=h;
document.getElementById(“donehome”).onclick=function(){goHome();};
pg(“p-done”);
}

document.getElementById(“restskip”).onclick=function(){
if(RT){clearInterval(RT);RT=null;}
var ov=document.getElementById(“restov”);if(ov)ov.className=“restov”;
};

try{goHome();}catch(err){document.body.style.background=”#fff”;document.body.style.color=”#000”;document.body.style.padding=“40px”;document.body.style.fontSize=“16px”;document.body.innerHTML=”<h2>JS Error</h2><pre>”+err.message+”</pre><pre>”+err.stack+”</pre>”;}
</script>

</body>
</html>
